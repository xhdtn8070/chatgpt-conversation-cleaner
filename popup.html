<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conversation Cleaner for ChatGPT</title>
  </head>
  <body>
    <main id="app" class="popup-shell">
      <section class="header">
        <img class="app-icon" src="/icons/icon.svg" alt="" aria-hidden="true" />
        <div class="title-block">
          <p class="eyebrow">ChatGPT</p>
          <h1 id="appHeading">Cleaner</h1>
        </div>
        <div class="header-controls">
          <button id="languageToggle" class="language-toggle" type="button">KO</button>
          <label id="bulkModeSwitch" class="switch" title="Toggle bulk selection mode">
            <input id="bulkMode" type="checkbox" />
            <span aria-hidden="true"></span>
          </label>
        </div>
      </section>

      <section class="status-panel" aria-live="polite">
        <div>
          <span id="statusLabel" class="label">Status</span>
          <strong id="statusText">Connecting...</strong>
        </div>
        <div>
          <span id="visibleLabel" class="label">Visible</span>
          <strong id="visibleCount">0</strong>
        </div>
        <div>
          <span id="selectedLabel" class="label">Selected</span>
          <strong id="selectedCount">0</strong>
        </div>
      </section>

      <section id="bulkActions" class="actions" aria-label="Bulk actions">
        <button id="selectAll" type="button">Select all visible</button>
        <button id="clear" type="button">Clear</button>
        <button id="archive" type="button">Archive</button>
        <button id="delete" class="danger" type="button">Delete</button>
      </section>

      <section class="settings-row">
        <div>
          <strong id="sidebarPanelLabel">Sidebar panel</strong>
          <span id="sidebarPanelHint">Show bulk controls inside ChatGPT's sidebar.</span>
        </div>
        <button
          id="sidebarPanelToggle"
          class="mini-switch"
          type="button"
          role="switch"
          aria-checked="true"
        >
          <span aria-hidden="true"></span>
        </button>
      </section>

      <section class="settings-row">
        <div>
          <strong id="speedModeLabel">Speed mode</strong>
          <span id="speedModeHint">Open long chats with only recent messages rendered first.</span>
          <span id="speedModeSummary">Initial 10 · Load 2 each</span>
        </div>
        <button
          id="speedModeToggle"
          class="mini-switch"
          type="button"
          role="switch"
          aria-checked="false"
        >
          <span aria-hidden="true"></span>
        </button>
      </section>

      <section id="speedSettings" class="speed-settings" aria-label="Speed mode settings" hidden>
        <label>
          <span id="speedVisibleLabel">Initial messages</span>
          <input id="speedVisibleMessages" type="number" min="1" max="100" step="1" value="10" />
        </label>
        <label>
          <span id="speedBatchLabel">Load more size</span>
          <input id="speedBatchMessages" type="number" min="1" max="50" step="1" value="2" />
        </label>
        <button id="speedSettingsSave" type="button">Save</button>
        <span id="speedSettingsSaved" class="saved-status" aria-live="polite"></span>
      </section>

      <p id="hint" class="hint">
        Open ChatGPT and turn on Bulk mode to show the sidebar checkbox lane.
      </p>
    </main>
    <script type="module" src="/src/popup/main.ts"></script>
  </body>
</html>

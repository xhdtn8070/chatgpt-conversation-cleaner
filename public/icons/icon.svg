      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="accent" x1="22" y1="22" x2="108" y2="110" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#58d6a4"/>
      <stop offset="1" stop-color="#13a875"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <rect x="12" y="12" width="104" height="104" rx="22" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>


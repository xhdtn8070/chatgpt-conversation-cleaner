    <rect x="58" y="73" width="24" height="4" rx="2" fill="#64748b" opacity="0.62"/>

    <rect x="32" y="86" width="18" height="18" rx="5" fill="url(#accent)"/>
    <path d="M37 95.5l3.6 3.6L47 91.8" fill="none" stroke="#ffffff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>

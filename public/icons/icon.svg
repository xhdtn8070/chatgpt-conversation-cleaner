    <rect x="58" y="48" width="22" height="4" rx="2" fill="#64748b" opacity="0.62"/>

    <rect x="32" y="61" width="18" height="18" rx="5" fill="url(#accent)"/>
    <path d="M37 70.5l3.6 3.6L47 66.8" fill="none" stroke="#ffffff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Conversation Cleaner for ChatGPT icon</title>
  <desc id="desc">A sidebar list with selected checkboxes and clean action marks.</desc>
  <defs>
    <linearGradient id="bg" x1="16" y1="8" x2="112" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14213d"/>

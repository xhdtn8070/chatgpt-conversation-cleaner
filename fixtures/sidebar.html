<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mock ChatGPT Sidebar</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        grid-template-columns: 320px 1fr;
        background: Canvas;
        color: CanvasText;
      }

      nav {
        height: 100vh;
        overflow-y: auto;
        border-right: 1px solid color-mix(in srgb, CanvasText 12%, transparent);
        padding: 64px 10px 120px;
        box-sizing: border-box;
      }

      .text-token-text-tertiary {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        height: 30px;
        padding: 0 16px;
        color: color-mix(in srgb, CanvasText 54%, transparent);
        font-size: 12px;
        font-weight: 700;
      }

      ol {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      li {
        height: 44px;
        margin-bottom: 4px;
        border-radius: 8px;
      }

      a {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        height: 44px;
        padding: 0 12px;
        border-radius: 8px;
        color: inherit;
        text-decoration: none;
      }

      a:hover {
        background: color-mix(in srgb, CanvasText 7%, transparent);
      }

      button.more {
        width: 28px;
        height: 28px;
      }

      button.pin {
        width: 28px;
        height: 28px;
      }

      main {
        padding: 32px;
      }
    </style>
  </head>
  <body>
    <nav data-testid="sidebar" aria-label="Chat history">
      <div
        class="text-token-text-tertiary flex w-full items-center justify-start gap-0.5 px-4 py-1.5"
      >
        Recent
      </div>
      <ol>
        <li id="row-alpha">
          <a href="/c/alpha" aria-label="Alpha planning thread">
            <span>Alpha planning thread</span>
            <button class="more" aria-label="Open conversation options">...</button>
          </a>
        </li>
        <li id="row-beta">
          <a href="/c/beta" aria-label="Beta release notes with a very long conversation title">
            <span>Beta release notes with a very long conversation title</span>
            <button class="more" aria-label="Open conversation options">...</button>
          </a>
        </li>
        <li id="row-gamma">
          <a href="/c/gamma" aria-label="Gamma QA checklist">
            <span>Gamma QA checklist</span>
            <button class="more" aria-label="Open conversation options">...</button>
          </a>
        </li>
        <li id="row-pinned">
          <a href="/c/pinned" aria-label="Pinned design review">
            <span>Pinned design review</span>
            <button class="pin" aria-label="Unpin conversation">Pin</button>
            <button class="more" aria-label="Open conversation options">...</button>
          </a>
        </li>
      </ol>
    </nav>
    <main>
      <h1>Mock content</h1>
      <p>This fixture validates the injected checkbox lane without touching ChatGPT data.</p>
    </main>
    <script>
      window.__navigated = false;
      let activeMenu = null;

      for (const anchor of document.querySelectorAll("a")) {
        anchor.addEventListener("click", (event) => {
          const wasPrevented = event.defaultPrevented;
          event.preventDefault();
          window.__navigated = !wasPrevented;
        });
      }

      function closeMenu() {
        activeMenu?.remove();
        activeMenu = null;
      }

      function removeRow(button) {
        button.closest("li")?.remove();
        closeMenu();
      }

      for (const button of document.querySelectorAll("button.more")) {
        button.addEventListener("click", (event) => {
          event.preventDefault();
          closeMenu();

          const rect = button.getBoundingClientRect();
          const menu = document.createElement("div");
          menu.setAttribute("role", "menu");
          menu.style.position = "fixed";
          menu.style.left = `${rect.left - 120}px`;
          menu.style.top = `${rect.bottom + 4}px`;
          menu.style.display = "grid";
          menu.style.gap = "4px";
          menu.style.padding = "6px";
          menu.style.border = "1px solid rgba(128,128,128,.35)";
          menu.style.borderRadius = "8px";
          menu.style.background = "Canvas";
          menu.style.color = "CanvasText";
          menu.style.zIndex = "1000";

          const archive = document.createElement("button");
          archive.type = "button";
          archive.setAttribute("role", "menuitem");
          archive.textContent = "Archive";
          archive.addEventListener("click", () => removeRow(button));

          const del = document.createElement("button");
          del.type = "button";
          del.setAttribute("role", "menuitem");
          del.textContent = "Delete";
          del.addEventListener("click", () => {
            closeMenu();
            const dialog = document.createElement("section");
            dialog.setAttribute("role", "dialog");
            dialog.style.position = "fixed";
            dialog.style.left = "360px";
            dialog.style.top = "120px";
            dialog.style.padding = "16px";
            dialog.style.border = "1px solid rgba(128,128,128,.35)";
            dialog.style.borderRadius = "8px";
            dialog.style.background = "Canvas";
            dialog.style.color = "CanvasText";
            dialog.style.zIndex = "1000";
            dialog.innerHTML = "<h2>Confirm delete</h2>";

            const confirm = document.createElement("button");
            confirm.type = "button";
            confirm.textContent = "Delete";
            confirm.addEventListener("click", () => {
              if (!confirm.dataset.acceptedOnce) {
                confirm.dataset.acceptedOnce = "true";
                return;
              }

              removeRow(button);
              dialog.remove();
            });

            dialog.append(confirm);
            document.body.append(dialog);
          });

          menu.append(archive, del);
          document.body.append(menu);
          activeMenu = menu;
        });
      }
    </script>
  </body>
</html>

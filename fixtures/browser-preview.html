<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatGPT Bulk Delete Preview</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        grid-template-columns: 320px 1fr;
        background: Canvas;
        color: CanvasText;
      }

      nav {
        height: 100vh;
        overflow-y: auto;
        border-right: 1px solid color-mix(in srgb, CanvasText 12%, transparent);
        padding: 64px 10px 120px;
        box-sizing: border-box;
      }

      .text-token-text-tertiary {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        height: 30px;
        margin: 16px 0 8px;
        padding: 0 16px;
        color: color-mix(in srgb, CanvasText 54%, transparent);
        font-size: 11px;
        font-weight: 700;
      }

      ol {
        list-style: none;
        margin: 0;
        padding: 0;
      }

      li {
        position: relative;
        height: 44px;
        margin-bottom: 4px;
        border-radius: 8px;
      }

      a {
        display: flex;
        align-items: center;
        height: 44px;
        padding: 0 42px 0 12px;
        border-radius: 8px;
        color: inherit;
        text-decoration: none;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      a:hover {
        background: color-mix(in srgb, CanvasText 7%, transparent);
      }

      .more {
        position: absolute;
        right: 8px;
        top: 8px;
        width: 28px;
        height: 28px;
        border: 0;
        border-radius: 6px;
        background: color-mix(in srgb, CanvasText 7%, transparent);
        color: inherit;
      }

      main {
        padding: 32px;
      }
    </style>
  </head>
  <body>
    <nav data-testid="sidebar" aria-label="Chat history">
      <div
        class="text-token-text-tertiary flex w-full items-center justify-start gap-0.5 px-4 py-1.5"
      >
        Recent
      </div>
      <ol>
        <li id="row-alpha">
          <a href="/c/alpha">Alpha planning thread</a>
          <button class="more" aria-label="Open conversation options">...</button>
        </li>
        <li id="row-beta">
          <a href="/c/beta">Beta release notes with a very long conversation title</a>
          <button class="more" aria-label="Open conversation options">...</button>
        </li>
        <li id="row-gamma">
          <a href="/c/gamma">Gamma QA checklist</a>
          <button class="more" aria-label="Open conversation options">...</button>
        </li>
      </ol>
      <div class="text-token-text-tertiary flex w-full items-center justify-start gap-0.5 px-4 py-1.5">
        Yesterday
      </div>
      <ol>
        <li>
          <a href="/c/delta">Delta architecture review</a>
          <button class="more" aria-label="Open conversation options">...</button>
        </li>
        <li>
          <a href="/c/epsilon">Epsilon prompt experiments</a>
          <button class="more" aria-label="Open conversation options">...</button>
        </li>
      </ol>
    </nav>
    <main>
      <h1>Mock ChatGPT page</h1>
      <p>The built content script is loaded here for visual verification only.</p>
    </main>
    <script>
      window.chrome = {
        storage: {
          local: {
            get(key, callback) {
              callback({ [key]: true });
            },
            set(_items, callback) {
              callback?.();
            }
          }
        },
        runtime: {
          onMessage: {
            addListener() {}
          }
        }
      };
    </script>
    <script src="../dist/assets/content.js"></script>
  </body>
</html>

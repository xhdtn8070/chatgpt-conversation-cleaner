name: Release extension package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload the package to"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  package:
    name: Build and attach Chrome extension zip
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Package extension
        id: package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          ASSET_NAME="chatgpt-conversation-cleaner-${VERSION}.zip"
          find dist -name '*.map' -delete
          (cd dist && zip -r "../${ASSET_NAME}" .)
          echo "asset_name=${ASSET_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload package to release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
          ASSET_NAME: ${{ steps.package.outputs.asset_name }}
        run: gh release upload "$RELEASE_TAG" "$ASSET_NAME" --clobber

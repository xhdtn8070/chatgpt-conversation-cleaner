name: Release extension package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release"
        required: true
        default: "v0.1.1"

permissions:
  contents: write

jobs:
  package:
    name: Build and publish Chrome extension zip
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Package extension
        id: package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          ASSET_NAME="chatgpt-conversation-cleaner-${VERSION}.zip"
          find dist -name '*.map' -delete
          (cd dist && zip -r "../${ASSET_NAME}" .)
          echo "asset_name=${ASSET_NAME}" >> "$GITHUB_OUTPUT"

      - name: Write release notes
        shell: bash
        run: |
          cat > release-notes.md <<'EOF'
          ## Initial public release

          This is the first public release of Conversation Cleaner for ChatGPT.

          ### Highlights
          - Bulk-select ChatGPT sidebar conversations with a separate checkbox lane.
          - Archive or delete selected conversations with explicit confirmation.
          - Prefer ChatGPT private API actions, with scoped UI fallback where needed.
          - Korean and English UI support.
          - Optional speed mode controls for long conversations.

          ### Verification
          - `npm run typecheck`
          - `npm run test`
          - `npm run build`

          The attached ZIP is the built Chrome extension package for Chrome Web Store upload.
          EOF

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
          ASSET_NAME: ${{ steps.package.outputs.asset_name }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$ASSET_NAME" --clobber
          else
            gh release create "$RELEASE_TAG" "$ASSET_NAME" \
              --title "$RELEASE_TAG" \
              --notes-file release-notes.md \
              --latest
          fi
